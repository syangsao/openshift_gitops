apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# QNAP CSI Driver (Trident-based) deployment manifests.
# Sources: https://github.com/qnap-dev/QNAP-CSI-PlugIn/tree/main/Deploy
# Mirrored here for ArgoCD GitOps management.
#
# Install order:
#   1. namespace.yaml   — creates the 'trident' namespace
#   2. crd.yaml         — TridentOrchestrator CRD (cluster-scoped)
#   3. bundle.yaml      — ServiceAccount, ClusterRoles, Roles, Deployments, Services
#   4. trident-orchestrator.yaml — TridentOrchestrator custom resource

resources:
  - namespace.yaml
  - crd.yaml
  - bundle.yaml
  - trident-orchestrator.yaml
