apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: qnap-csi-argocd-access
rules:
# TridentOrchestrator and TridentBackendConfig custom resources
- apiGroups: ["trident.qnap.io"]
  resources: ["tridentorchestrators", "tridentbackendconfigs"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
# Storage resources managed by Trident
- apiGroups: [""]
  resources: ["persistentvolumes", "persistentvolumeclaims", "persistentvolumeclaims/status"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
- apiGroups: ["storage.k8s.io"]
  resources: ["storageclasses"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: qnap-csi-argocd-binding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: qnap-csi-argocd-access
subjects:
- kind: ServiceAccount
  name: openshift-gitops-argocd-application-controller
  namespace: openshift-gitops
